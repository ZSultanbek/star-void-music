version: "3.9"

services:
  db:
    image: postgres:15
    container_name: svm-db
    environment:
      POSTGRES_USER: starvoid
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: star_void_music
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: svm-backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:password@db:5432/starvoid?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
